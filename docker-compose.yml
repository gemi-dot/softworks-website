services:
  softworks-website:
    build:
      context: .
      dockerfile: Dockerfile
      target: dependencies

    container_name: softworks_website

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"

    command: npm run dev -- --hostname 0.0.0.0 --port 3000

    volumes:
      - .:/app
      - /app/node_modules

    restart: unless-stopped